# Terminal type
set -g default-terminal "tmux-256color"

# Mouse support
set -g mouse on

# Minimal window status
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g window-status-current-style "bold,underscore"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Vi copy mode
set -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Swedish keyboard friendly copy/paste
bind ö copy-mode
bind ä paste-buffer

# Faster escape for vim
set -g escape-time 0

# New windows/panes keep current path
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Start numbering at 1
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Pane titles
set -g pane-border-status top
set -g pane-border-format " #{pane_title} "
bind T command-prompt -p "Pane title:" 'select-pane -T "%%"'

# Scrollback buffer
set -g history-limit 10000
